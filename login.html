<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Nóminas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo-icon">
                    <i class="fas fa-calculator"></i>
                </div>
                <h1>NÓMINAS</h1>
                <p>Sistema de Gestión de Salarios</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <div class="input-wrapper">
                        <div class="input-icon">
                            <i class="fas fa-user"></i>
                        </div>
                        <input 
                            type="text" 
                            id="username" 
                            placeholder="Usuario" 
                            required
                            autocomplete="username"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                        </div>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="Contraseña" 
                            required
                            autocomplete="current-password"
                        >
                    </div>
                </div>

                <div class="error-message" id="errorMessage"></div>

                <button type="submit" class="login-btn">
                    <span>Iniciar Sesión</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

        </div>

        <div class="background-animation">
            <!-- Cohete orbitando con fuego (moved here so it can traverse full background) -->
            <div class="rocket-orbit">
                <div class="rocket">
                    <i class="fas fa-rocket"></i>
                </div>
                <div class="rocket-fire rocket-fire-1"></div>
                <div class="rocket-fire rocket-fire-2"></div>
                <div class="rocket-fire rocket-fire-3"></div>
            </div>
            <!-- Galaxia con estrellas -->
            <div class="galaxy-bg"></div>
            
            <!-- Estrellas fijas que parpadean -->
            <div class="stars-container">
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
            </div>
            
            <!-- Estrellas fugaces (meteoros) -->
            <div class="meteors-container">
                <div class="meteor"></div>
                <div class="meteor"></div>
                <div class="meteor"></div>
                <div class="meteor"></div>
                <div class="meteor"></div>
            </div>

            <!-- Planetas -->
            <div class="planets-container">
                <div class="planet planet-1">
                    <div class="planet-surface"></div>
                    <div class="planet-rings"></div>
                </div>
                <div class="planet planet-2">
                    <div class="planet-surface"></div>
                </div>
                <div class="planet planet-3">
                    <div class="planet-surface"></div>
                    <div class="planet-rings"></div>
                </div>
                <div class="planet planet-4">
                    <div class="planet-surface"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
